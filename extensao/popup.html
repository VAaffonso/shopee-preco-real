<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Shopee Preço Real</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          font-family: sans-serif;
          width: 350px;
          min-height: 200px;
          background: #fff;
        }

        header {
          background: #ee4d2d;
          color: white;
          padding: 12px 16px;
          font-size: 15px;
          font-weight: bold;
        }

        #lista {
          padding: 8px;
        }

        .produto {
          border: 1px solid #f0f0f0;
          border-radius: 8px;
          padding: 10px 12px;
          margin-bottom: 8px;
        }

        .produto-nome {
          font-size: 12px;
          color: #555;
          margin-bottom: 6px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .produto-preco {
          font-size: 14px;
          font-weight: bold;
          color: #ee4d2d;
        }

        .produto-menor {
          font-size: 12px;
          color: #888;
          margin-top: 2px;
        }

        .badge-queda {
          background: #e8f5e9;
          color: #2e7d32;
          font-size: 11px;
          padding: 2px 6px;
          border-radius: 10px;
          margin-left: 6px;
        }

        .badge-alta {
          background: #ffebee;
          color: #c62828;
          font-size: 11px;
          padding: 2px 6px;
          border-radius: 10px;
          margin-left: 6px;
        }

        .vazio {
          text-align: center;
          color: #aaa;
          padding: 40px 16px;
          font-size: 13px;
        }

        a.ver {
          font-size: 11px;
          color: #ee4d2d;
          text-decoration: none;
          float: right;
        }
    </style>
</head>
<body>
<header>📊 Produtos Monitorados</header>
<div id="lista">
    <p class="vazio">Carregando...</p>
</div>
<script src="popup.js"></script>
</body>
</html>
